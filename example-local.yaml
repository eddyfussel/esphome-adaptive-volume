# ESPHome Device Config – Dynamic TTS Volume (local development)
#
# Use this file when developing locally so ESPHome picks up component sources
# from this repo directly instead of fetching them from GitHub.
#
# 1. Copy this file and rename it to your device's name.
# 2. Fill in the substitutions below.
# 3. Run: esphome compile example-local.yaml (or your renamed copy)

substitutions:
  name: home-assistant-voice-XXXXXX      # replace with your device's MAC suffix
  friendly_name: Home Assistant Voice <Room>

packages:
  # Official HA Voice PE firmware
  Nabu Casa.Home Assistant Voice PE: github://esphome/home-assistant-voice-pe/home-assistant-voice.yaml@dev

  # Dynamic TTS Volume – loaded from local sources in this repo
  dynamic_volume: !include dynamic-volume-local.yaml

esphome:
  name: ${name}
  name_add_mac_suffix: false
  friendly_name: ${friendly_name}

api:
  encryption:
    key: !secret api_key   # generate with: openssl rand -base64 32

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
