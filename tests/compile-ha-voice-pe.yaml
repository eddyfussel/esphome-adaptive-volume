# Compile / validation test — HA Voice PE
#
# Uses the local component sources from components/ in this repo.
# Run via Taskfile (preferred):
#   task check:ha-voice-pe     # fast YAML validation
#   task compile:ha-voice-pe   # full C++ compile
#
# Or manually (requires tests/secrets.yaml):
#   esphome config   tests/compile-ha-voice-pe.yaml
#   esphome compile  tests/compile-ha-voice-pe.yaml

substitutions:
  name: dynvol-test-voice-pe
  friendly_name: "DynVol Test HA Voice PE"

packages:
  # Official HA Voice PE firmware — pin to a version matching your ESPHome install:
  #   26.4.0 → ESPHome 2026.4.x   (current, matches test environment)
  #   26.5.0 / dev → ESPHome 2026.5+
  Nabu Casa.Home Assistant Voice PE: github://esphome/home-assistant-voice-pe/home-assistant-voice.yaml@26.4.0

esphome:
  name: ${name}
  name_add_mac_suffix: false
  friendly_name: ${friendly_name}
  on_boot:
    priority: -100
    then:
      - lambda: |-
          id(dynamic_vol).set_enabled(id(dyn_vol_switch).state);
          id(dynamic_vol).set_min_volume_number(id(dyn_vol_min));
          id(dynamic_vol).set_max_volume_number(id(dyn_vol_max));
          id(dynamic_vol).set_quiet_db_number(id(dyn_vol_quiet_db));
          id(dynamic_vol).set_loud_db_number(id(dyn_vol_loud_db));

api:
  encryption:
    key: !secret api_key

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

# Load component from local sources (../components relative to this file)
external_components:
  - source:
      type: local
      path: ../components
    components: [dynamic_volume]

# ── dynamic_volume ────────────────────────────────────────────────────────────
dynamic_volume:
  id: dynamic_vol
  microphone: i2s_mics
  media_player: external_media_player
  smoothing_factor: 0.05

sensor:
  - platform: template
    id: ambient_db_sensor
    name: "Ambient Noise Level"
    unit_of_measurement: "dBFS"
    icon: "mdi:microphone"
    accuracy_decimals: 1
    entity_category: diagnostic
    state_class: measurement
    update_interval: 5s
    lambda: return id(dynamic_vol).get_ambient_db();

switch:
  - platform: template
    id: dyn_vol_switch
    name: "Dynamic TTS Volume"
    icon: "mdi:volume-high"
    entity_category: config
    optimistic: true
    restore_mode: RESTORE_DEFAULT_ON
    on_turn_on:
      - lambda: id(dynamic_vol).set_enabled(true);
    on_turn_off:
      - lambda: id(dynamic_vol).set_enabled(false);

number:
  - platform: template
    id: dyn_vol_min
    name: "Dynamic Volume Min"
    icon: "mdi:volume-low"
    entity_category: config
    min_value: 0.0
    max_value: 1.0
    step: 0.05
    initial_value: 0.4
    restore_value: true
    optimistic: true

  - platform: template
    id: dyn_vol_max
    name: "Dynamic Volume Max"
    icon: "mdi:volume-high"
    entity_category: config
    min_value: 0.0
    max_value: 1.0
    step: 0.05
    initial_value: 0.85
    restore_value: true
    optimistic: true

  - platform: template
    id: dyn_vol_quiet_db
    name: "Quiet Threshold (dBFS)"
    icon: "mdi:volume-off"
    entity_category: config
    min_value: -80.0
    max_value: 0.0
    step: 1.0
    initial_value: -50.0
    restore_value: true
    optimistic: true

  - platform: template
    id: dyn_vol_loud_db
    name: "Loud Threshold (dBFS)"
    icon: "mdi:volume-vibrate"
    entity_category: config
    min_value: -80.0
    max_value: 0.0
    step: 1.0
    initial_value: -25.0
    restore_value: true
    optimistic: true

