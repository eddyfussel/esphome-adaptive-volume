# ESPHome Device Config – Dynamic TTS Volume (example)
#
# Copy this file, rename it to your device's name, fill in the substitutions,
# and flash it. The dynamic_volume package handles everything else.
#
# Requirements in your Home Assistant ESPHome add-on:
#   - A device with an I2S microphone named "i2s_mics"
#   - A media player named "external_media_player"
#   Both are provided by the official HA Voice PE firmware.

substitutions:
  name: home-assistant-voice-XXXXXX      # replace with your device's MAC suffix
  friendly_name: Home Assistant Voice <Room>

packages:
  # Official HA Voice PE firmware
  Nabu Casa.Home Assistant Voice PE: github://esphome/home-assistant-voice-pe/home-assistant-voice.yaml@dev

  # Dynamic TTS Volume – adjusts speaker volume based on ambient noise
  dynamic_volume: github://eddyfussel/voice-pe-dynamic-volume/dynamic-volume.yaml@main

esphome:
  name: ${name}
  name_add_mac_suffix: false
  friendly_name: ${friendly_name}

api:
  encryption:
    key: !secret api_key   # generate with: openssl rand -base64 32

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
